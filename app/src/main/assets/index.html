<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Luggage Dashboard</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --primary-color: #BB86FC;
            --text-color: #e0e0e0;
            --success-color: #03DAC6;
            --error-color: #CF6679;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--text-color);
            background: linear-gradient(-45deg, #1a0b2e, #0e1e3b, #122936, #121212);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        /* Liquid Background Animation */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Liquid Blob Effect behind everything */
        body::before {
            content: "";
            position: absolute;
            top: -10%; left: -10%; right: -10%; bottom: -10%;
            background: radial-gradient(circle at 50% 50%, rgba(187, 134, 252, 0.15), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(3, 218, 198, 0.15), transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(3, 218, 198, 0.15), transparent 50%);
            filter: blur(60px);
            z-index: -1;
            animation: floatBlobs 20s ease-in-out infinite alternate;
        }

        @keyframes floatBlobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(5%, 5%) scale(1.1); }
            100% { transform: translate(-5%, -5%) scale(0.9); }
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: rgba(30, 30, 30, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            z-index: 10;
        }

        h1 { margin: 0; font-size: 1.8rem; color: var(--primary-color); letter-spacing: 1px; }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 30px;
            margin-bottom: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-gap: 25px;
            z-index: 1;
        }

        .card {
            background: rgba(40, 40, 40, 0.25);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Settings */
        .settings-card { grid-column: span 2; flex-direction: row; justify-content: center; gap: 20px; }
        select {
            padding: 10px;
            border-radius: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            font-size: 1rem;
        }

        /* Total Weight Widget */
        .weight-card { grid-column: span 2; }
        .weight-value { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .compliant { color: var(--success-color); background: rgba(3, 218, 198, 0.2); }
        .overweight { color: var(--error-color); background: rgba(207, 102, 121, 0.2); animation: flash 1s infinite alternate; }

        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }

        /* Heatmap */
        .heatmap-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            aspect-ratio: 1;
            gap: 5px;
            background: #000;
            padding: 5px;
            border-radius: 8px;
        }
        .quadrant {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        /* Chart */
        .chart-container { width: 100%; aspect-ratio: 1; }

        /* History */
        .history-card { grid-column: span 2; align-items: flex-start; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        /* Settings and Controls */
        .settings-card { grid-column: span 2; display: flex; flex-wrap: wrap; gap: 20px; justify-content: space-around; width: 100%; box-sizing: border-box; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        select {
            padding: 10px;
            border-radius: 8px;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            font-size: 1rem;
        }

        /* Toggle Button styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #555;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--success-color); }
        input:checked + .slider:before { transform: translateX(26px); }

        .sync-status {
            font-size: 0.9rem;
            color: #888;
            margin-top: 5px;
            text-align: center;
        }

        /* Total Weight Widget */
        .weight-card { grid-column: span 2; }
        .weight-value { font-size: 3rem; font-weight: bold; margin: 10px 0; }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
        }
        .compliant { color: var(--success-color); background: rgba(3, 218, 198, 0.2); }
        .overweight { color: var(--error-color); background: rgba(207, 102, 121, 0.2); animation: flash 1s infinite alternate; }

        @keyframes flash {
            from { opacity: 1; }
            to { opacity: 0.7; }
        }

        /* Heatmap */
        .heatmap-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%;
            aspect-ratio: 1;
            gap: 5px;
            background: #000;
            padding: 5px;
            border-radius: 8px;
        }
        .quadrant {
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
            font-size: 1.2rem;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        /* Chart */
        .chart-container { width: 100%; aspect-ratio: 1; }

        /* History */
        .history-card { grid-column: span 2; align-items: flex-start; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #333; }
        th { color: var(--primary-color); }

        @media (max-width: 600px) {
            .container { grid-template-columns: 1fr; }
            .settings-card, .weight-card, .history-card { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Smart Luggage Dashboard</h1>
    </header>

    <div class="container">
        <!-- Settings & Source Switcher -->
        <div class="card settings-card">
            <div class="control-group" style="width: 100%; justify-content: space-between;">
                <div>
                    <label for="limit-select"><strong>Airline Limit:</strong></label>
                    <select id="limit-select">
                        <option value="15">15 kg (Budget)</option>
                        <option value="23" selected>23 kg (Standard)</option>
                        <option value="32">32 kg (Heavy/First Class)</option>
                    </select>
                </div>
            
                <div>
                    <label for="source-select"><strong>Data Source:</strong></label>
                    <select id="source-select" style="background-color: var(--surface-color);">
                        <option value="simulated" selected>Local Simulation</option>
                        <option value="firebase">Live Firebase DB</option>
                        <option value="esp32">ESP32 Direct IP</option>
                    </select>
                </div>
            </div>
            
            <!-- ESP32 Settings Panel -->
            <div id="esp32-settings" class="control-group" style="display: none; width: 100%; justify-content: center; margin-top: 10px;">
                <input type="text" id="esp32-ip" placeholder="ESP32 IP (e.g. 192.168.1.100)" style="flex:1; padding: 10px; border-radius: 8px; background: #333; color: #fff; border: 1px solid #555; max-width: 300px;">
                <button id="esp32-connect-btn" style="padding: 10px 20px; border-radius: 8px; background: var(--primary-color); border: none; font-weight: bold; cursor: pointer; color: #121212; transition: filter 0.3s;">Connect</button>
            </div>
        </div>

        <div style="grid-column: span 2; display: flex; justify-content: center;">
            <div class="sync-status" id="db-status">Status: Using local simulation data</div>
        </div>

        <!-- Total Weight Widget -->
        <div class="card weight-card">
            <h2>Total Weight</h2>
            <div class="weight-value" id="total-weight">0.0 kg</div>
            <div class="status-badge compliant" id="weight-status">Compliant</div>
        </div>

        <!-- 4-Corner Heatmap -->
        <div class="card">
            <h2>Load Distribution</h2>
            <div class="heatmap-container">
                <div class="quadrant" id="q1">0%</div>
                <div class="quadrant" id="q2">0%</div>
                <div class="quadrant" id="q3">0%</div>
                <div class="quadrant" id="q4">0%</div>
            </div>
        </div>

        <!-- Center of Gravity -->
        <div class="card">
            <h2>Center of Gravity</h2>
            <div class="chart-container">
                <canvas id="cogChart"></canvas>
            </div>
        </div>

        <!-- Historical Log -->
        <div class="card history-card">
            <h2>Recent Weighings</h2>
            <table>
                <thead>
                    <tr>
                        <th>Time</th>
                        <th>Weight</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase SDK (Phase 2 Integration) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Your database configuration
        const firebaseConfig = {
            databaseURL: "https://smart-luggage-d4b56-default-rtdb.firebaseio.com"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
    </script>

    <script>
        // DOM Elements
        const limitSelect = document.getElementById('limit-select');
        const weightValue = document.getElementById('total-weight');
        const weightStatus = document.getElementById('weight-status');
        const q1 = document.getElementById('q1');
        const q2 = document.getElementById('q2');
        const q3 = document.getElementById('q3');
        const q4 = document.getElementById('q4');
        const historyBody = document.getElementById('history-body');
        const sourceSelect = document.getElementById('source-select');
        const dbStatus = document.getElementById('db-status');
        const esp32Settings = document.getElementById('esp32-settings');
        const esp32IpInput = document.getElementById('esp32-ip');
        const esp32ConnectBtn = document.getElementById('esp32-connect-btn');

        // Chart.js Setup
        const ctx = document.getElementById('cogChart').getContext('2d');
        const cogChart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'CoG',
                    data: [{x: 0, y: 0}],
                    backgroundColor: '#03DAC6',
                    pointRadius: 8,
                    pointHoverRadius: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { min: -1, max: 1, grid: { color: '#333' } },
                    y: { min: -1, max: 1, grid: { color: '#333' } }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });

        let lastStableWeight = 0;
        let historyLog = [];

        // Helper: Map 0.0-0.5 to Yellow(#FFF59D)->Red(#D32F2F)
        function getHeatColor(percent) {
            const factor = Math.min(percent * 2, 1);
            const r = Math.round(255 - (255 - 211) * factor); // 255 to 211
            const g = Math.round(245 - (245 - 47) * factor);  // 245 to 47
            const b = Math.round(157 - (157 - 47) * factor);  // 157 to 47
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Main Update Function
        function updateDashboard(data) {
            if (!data) return;
            const limit = parseFloat(limitSelect.value);
            const tw = parseFloat(data.total_weight || data.totalWeight || 0);
            
            // 1. Total Weight & Alert
            weightValue.textContent = tw.toFixed(1) + ' kg';
            if (tw > limit) {
                weightValue.style.color = 'var(--error-color)';
                weightStatus.className = 'status-badge overweight';
                weightStatus.textContent = 'OVERWEIGHT ALERT';
            } else {
                weightValue.style.color = 'var(--success-color)';
                weightStatus.className = 'status-badge compliant';
                weightStatus.textContent = 'Compliant';
            }

            // Norm corners to 0..1
            let c1 = parseFloat(data.corner_1_pct || data.corner1Pct || 0);
            let c2 = parseFloat(data.corner_2_pct || data.corner2Pct || 0);
            let c3 = parseFloat(data.corner_3_pct || data.corner3Pct || 0);
            let c4 = parseFloat(data.corner_4_pct || data.corner4Pct || 0);

            if (c1 > 1 || c2 > 1 || c3 > 1 || c4 > 1) {
                c1 /= 100; c2 /= 100; c3 /= 100; c4 /= 100;
            }

            const sum = c1 + c2 + c3 + c4;
            const n1 = sum > 0 ? c1 / sum : 0.25;
            const n2 = sum > 0 ? c2 / sum : 0.25;
            const n3 = sum > 0 ? c3 / sum : 0.25;
            const n4 = sum > 0 ? c4 / sum : 0.25;

            // 2. Heatmap
            q1.style.backgroundColor = getHeatColor(n1);
            q1.textContent = Math.round(n1 * 100) + '%';
            
            q2.style.backgroundColor = getHeatColor(n2);
            q2.textContent = Math.round(n2 * 100) + '%';
            
            q3.style.backgroundColor = getHeatColor(n3);
            q3.textContent = Math.round(n3 * 100) + '%';
            
            q4.style.backgroundColor = getHeatColor(n4);
            q4.textContent = Math.round(n4 * 100) + '%';

            // 3. CoG
            const cx = parseFloat(data.cog_x || data.cogX || 0);
            const cy = parseFloat(data.cog_y || data.cogY || 0);
            cogChart.data.datasets[0].data = [{x: cx, y: cy}];
            cogChart.update();

            // 4. Log stable weights periodically
            if (Math.abs(tw - lastStableWeight) > 0.1) {
                const time = new Date().toLocaleTimeString();
                historyLog.unshift(`<tr>
                    <td>${time}</td>
                    <td style="color: ${tw > limit ? 'var(--error-color)' : 'var(--success-color)'}; font-weight: bold;">${tw.toFixed(1)} kg</td>
                    <td>${tw > limit ? 'Overweight' : 'OK'}</td>
                </tr>`);
                if (historyLog.length > 10) historyLog.pop();
                historyBody.innerHTML = historyLog.join('');
                lastStableWeight = tw;
            }
        }

        // Simulated Data Generator
        function fetchIoTData() {
            const limit = parseFloat(limitSelect.value);
            const isOver = Math.random() > 0.7;
            const tw = isOver ? limit + Math.random() * 5 : limit - Math.random() * 10;
            
            const c1 = Math.random(); const c2 = Math.random();
            const c3 = Math.random(); const c4 = Math.random();
            const sum = c1 + c2 + c3 + c4;

            const topWeight = (c1 + c2) / sum;
            const bottomWeight = (c3 + c4) / sum;
            const leftWeight = (c1 + c3) / sum;
            const rightWeight = (c2 + c4) / sum;

            const mockData = {
                total_weight: Math.max(0, tw),
                corner_1_pct: c1 / sum,
                corner_2_pct: c2 / sum,
                corner_3_pct: c3 / sum,
                corner_4_pct: c4 / sum,
                cog_x: Math.max(-1, Math.min(1, (rightWeight - leftWeight) * 2)),
                cog_y: Math.max(-1, Math.min(1, (bottomWeight - topWeight) * 2))
            };

            updateDashboard(mockData);
        }

        let mockInterval = setInterval(fetchIoTData, 2000);
        let fbListener = null;
        let esp32Interval = null;

        function clearSources() {
            if (mockInterval) { clearInterval(mockInterval); mockInterval = null; }
            if (fbListener) { db.ref('/luggage_data/').off('value', fbListener); fbListener = null; }
            if (esp32Interval) { clearInterval(esp32Interval); esp32Interval = null; }
        }

        async function fetchEsp32Data() {
            const ip = esp32IpInput.value.trim();
            if(!ip) return;
            try {
               const response = await fetch(`http://${ip}/data`);
               if(response.ok) {
                   const data = await response.json();
                   updateDashboard(data);
                   dbStatus.textContent = `Status: Synced with ESP32 at ${ip}`;
                   dbStatus.style.color = "var(--success-color)";
               }
            } catch (err) {
               dbStatus.textContent = "Status Error: Cannot connect to ESP32 /data endpoint";
               dbStatus.style.color = "var(--error-color)";
            }
        }

        esp32ConnectBtn.addEventListener('click', () => {
            const ip = esp32IpInput.value.trim();
            if(!ip) {
                alert("Please enter a valid ESP32 IP address");
                return;
            }
            dbStatus.textContent = `Status: Connecting to ESP32 at ${ip}...`;
            dbStatus.style.color = "var(--primary-color)";
            clearSources();
            esp32Interval = setInterval(fetchEsp32Data, 2000);
            fetchEsp32Data();
        });

        // Controller logic for Data Source Selection
        sourceSelect.addEventListener('change', (e) => {
            clearSources();
            const val = e.target.value;
            
            if (val === 'esp32') {
                esp32Settings.style.display = 'flex';
                dbStatus.textContent = "Status: Waiting for ESP32 IP address...";
                dbStatus.style.color = "#888";
            } else {
                esp32Settings.style.display = 'none';
                
                if (val === 'firebase') {
                    dbStatus.textContent = "Status: Connecting to Live Firebase Database...";
                    dbStatus.style.color = "var(--primary-color)";

                    // Enable Firebase listener
                    fbListener = db.ref('/luggage_data/').on('value', (snapshot) => {
                        dbStatus.textContent = "Status: Successfully synchronized with Live DB!";
                        dbStatus.style.color = "var(--success-color)";
                        if (snapshot.exists()) {
                            updateDashboard(snapshot.val());
                        } else {
                            // Fallback checking root node in case of path mismatch
                            db.ref('/').once('value', (snap) => {
                                const val = snap.val();
                                if (val) {
                                    updateDashboard(val.luggage_data || val);
                                }
                            });
                        }
                    }, (error) => {
                        dbStatus.textContent = "Status Error: " + error.message;
                        dbStatus.style.color = "var(--error-color)";
                    });
                } else if (val === 'simulated') {
                    dbStatus.textContent = "Status: Using local simulation data";
                    dbStatus.style.color = "#888";
                    mockInterval = setInterval(fetchIoTData, 2000);
                }
            }
        });

    </script>
</body>
</html>
